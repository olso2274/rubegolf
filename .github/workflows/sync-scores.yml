# Hits your production /api/update-scores with CRON_SECRET (bypasses Hobby cron limits).
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   PRODUCTION_URL  — e.g. https://www.rubegolf.com  (no trailing slash required)
#   CRON_SECRET     — must match Vercel env CRON_SECRET exactly (Production)
#
# If the job fails immediately: one of those secrets is missing or empty.
# If you see HTTP 401: CRON_SECRET in GitHub ≠ CRON_SECRET in Vercel, or CRON_SECRET unset on Vercel.

name: Sync PGA scores

on:
  schedule:
    # Every 5 minutes UTC (narrow in Actions if you want fewer runs)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/update-scores
        env:
          URL: ${{ secrets.PRODUCTION_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "::error::PRODUCTION_URL is not set in GitHub Actions secrets (repo → Settings → Secrets → Actions)."
            exit 1
          fi
          if [ -z "${SECRET:-}" ]; then
            echo "::error::CRON_SECRET is not set in GitHub Actions secrets (repo → Settings → Secrets → Actions)."
            exit 1
          fi
          BASE="${URL%/}"
          echo "POST ${BASE}/api/update-scores"
          TMP="$(mktemp)"
          CODE=$(curl -sS -o "$TMP" -w "%{http_code}" -X POST "${BASE}/api/update-scores" \
            -H "Authorization: Bearer ${SECRET}" \
            -H "Content-Type: application/json")
          cat "$TMP"
          echo ""
          echo "HTTP ${CODE}"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Request failed with HTTP ${CODE}. For 401, set CRON_SECRET the same in Vercel (Production) and GitHub."
            exit 1
          fi
